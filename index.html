<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speed Fine Checker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"></script>
  </head>
  <body
    class="min-h-screen bg-gradient-to-br from-neutral-950 via-amber-950 to-stone-950 flex items-center justify-center p-4"
  >
    <div id="main_container" class="w-full max-w-md">
      <div
        id="main_box"
        class="bg-stone-900/95 rounded-3xl shadow-[0_20px_60px_-15px_rgba(0,0,0,0.5)] p-8 sm:p-10 border border-amber-900/40"
      >
        <!-- Header -->
        <div class="text-center mb-8">
          <div
            class="w-16 h-16 bg-amber-900/40 rounded-2xl flex items-center justify-center mx-auto mb-4"
          >
            <span class="text-3xl">🚨🚔</span>
          </div>
          <h1 class="text-2xl sm:text-3xl font-bold text-amber-50">
            Speed Fine Checker
          </h1>
          <p class="text-amber-300/50 mt-1.5 text-sm sm:text-base">
            Enter a speed to check the fine.
          </p>
        </div>

        <!-- Input Area -->
        <div id="sub_box" class="space-y-4">
          <input
            type="text"
            id="numberInput"
            placeholder="e.g. 42, 85, 120"
            class="w-full h-14 px-5 rounded-2xl border-2 border-amber-800/40 bg-stone-800 text-amber-50 text-lg outline-none focus:border-amber-600 focus:bg-stone-700 focus:ring-4 focus:ring-amber-900/50 transition-all duration-200 placeholder:text-amber-200/30"
          />

          <!-- Speed Rules -->
          <div
            class="bg-stone-800 border border-amber-800/30 rounded-2xl p-4 text-sm text-amber-100"
          >
            <h3 class="font-semibold text-amber-300 mb-2">📋 Speed Rules</h3>
            <ul class="list-disc list-inside space-y-1">
              <li>0 – 60 km/h → ✅ Safe Driving</li>
              <li>61 – 80 km/h → ⚠️ Warning! Drive Carefully</li>
              <li>81 – 100 km/h → 💸 Fine: Rs. 2000</li>
              <li>101 – 120 km/h → 💸 Fine: Rs. 5000</li>
              <li>121 – 300 km/h → 🚫 License Suspended</li>
            </ul>
          </div>

          <button
            id="checkBtn"
            class="w-full h-14 rounded-2xl bg-gradient-to-r from-red-500 to-orange-500 text-white font-semibold text-lg hover:from-red-600 hover:to-orange-600 hover:shadow-lg hover:shadow-red-900/50 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 cursor-pointer"
          >
            <span>Check Fine</span>
            <span class="text-xl">→</span>
          </button>
        </div>

        <!-- Result -->
        <div class="mt-8 pt-6 border-t border-amber-900/30 text-center">
          <p
            class="text-xs font-semibold text-amber-400/60 uppercase tracking-[0.2em]"
          >
            Result
          </p>
          <h3 id="result" class="text-2xl font-bold text-amber-100 mt-2">—</h3>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
